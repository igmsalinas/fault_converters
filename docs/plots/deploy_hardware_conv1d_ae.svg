<text x="719.2" y="324.0" class="value" text-anchor="start">1.2×10⁻⁴</text>
<rect x="232.0" y="357.7" width="479.2" height="33.9" fill="#4a6670" rx="2"/>
<text x="218.0" y="378.7" class="tick-strong" text-anchor="end">Keras FP32 (CPU)</text>
<text x="721.2" y="378.7" class="value" text-anchor="start">1.2×10⁻⁴</text>
<rect x="232.0" y="412.4" width="479.7" height="33.9" fill="#4a6670" rx="2"/>
