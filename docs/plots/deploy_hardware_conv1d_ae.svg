<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 620" width="1040" height="620" role="img" font-family='"ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif' preserveAspectRatio="xMidYMid meet">
  <style>
    .bg { fill: none; }
    .title { font: 600 22px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #121212; }
    .subtitle { font: 400 14px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #8a837b; }
    .axis-title { font: 500 14px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #43413d; }
    .tick { font: 400 13px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #8a837b; }
    .tick-strong { font: 500 14px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #43413d; }
    .value { font: 500 12px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #43413d; }
    .legend { font: 400 14px "ABC Monument Grotesk Light","Helvetica Neue",Helvetica,Arial,sans-serif; fill: #43413d; }
    .grid { stroke: rgba(17,17,17,0.08); stroke-width: 1; }
    .axis { stroke: rgba(17,17,17,0.18); stroke-width: 1.2; }</style>
  <rect class="bg" x="0" y="0" width="1040" height="620"/>
<text x="24.0" y="34.0" class="title" text-anchor="start">Per-sample inference time by export format</text>
<text x="24.0" y="56.0" class="subtitle" text-anchor="start">Lower is faster · TensorRT engines highlighted</text>
<line class="grid" x1="232.0" y1="74" x2="232.0" y2="566"/>
<text x="232.0" y="590.0" class="tick" text-anchor="middle">10⁻⁶</text>
<line class="grid" x1="462.0" y1="74" x2="462.0" y2="566"/>
<text x="462.0" y="590.0" class="tick" text-anchor="middle">10⁻⁵</text>
<line class="grid" x1="692.0" y1="74" x2="692.0" y2="566"/>
<text x="692.0" y="590.0" class="tick" text-anchor="middle">10⁻⁴</text>
<line class="grid" x1="922.0" y1="74" x2="922.0" y2="566"/>
<text x="922.0" y="590.0" class="tick" text-anchor="middle">10⁻³</text>
<line class="axis" x1="232" y1="566" x2="922" y2="566"/>
<text x="577.0" y="608.0" class="axis-title" text-anchor="middle">Seconds per sample (log scale)</text>
<rect x="232.0" y="84.4" width="149.1" height="33.9" fill="#a7623f" rx="2"/>
