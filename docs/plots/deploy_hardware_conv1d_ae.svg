<text x="721.7" y="433.3" class="value" text-anchor="start">1.2×10⁻⁴</text>
<rect x="232.0" y="467.1" width="498.1" height="33.9" fill="#4a6670" rx="2"/>
<text x="218.0" y="488.0" class="tick-strong" text-anchor="end">TFLite Dynamic</text>
<text x="740.1" y="488.0" class="value" text-anchor="start">1.5×10⁻⁴</text>
<rect x="232.0" y="521.7" width="503.8" height="33.9" fill="#4a6670" rx="2"/>
<text x="218.0" y="542.7" class="tick-strong" text-anchor="end">TFLite FP16</text>
<text x="745.8" y="542.7" class="value" text-anchor="start">1.6×10⁻⁴</text>
</svg>
