<text x="391.1" y="105.3" class="value" text-anchor="start">4.4×10⁻⁶</text>
<rect x="232.0" y="139.1" width="155.9" height="33.9" fill="#a7623f" rx="2"/>
<text x="218.0" y="160.0" class="tick-strong" text-anchor="end">TensorRT FP32 (GPU)</text>
<text x="397.9" y="160.0" class="value" text-anchor="start">4.8×10⁻⁶</text>
<rect x="232.0" y="193.7" width="203.1" height="33.9" fill="#a7623f" rx="2"/>
<text x="218.0" y="214.7" class="tick-strong" text-anchor="end">TensorRT INT8 (GPU)</text>
<text x="445.1" y="214.7" class="value" text-anchor="start">7.6×10⁻⁶</text>
<rect x="232.0" y="248.4" width="370.5" height="33.9" fill="#4a6670" rx="2"/>
